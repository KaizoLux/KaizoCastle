  <script>
    // Load saved theme immediately before page renders (dari Dev Panel)
    (function() {
      try {
        var saved = localStorage.getItem('kc_theme');
        if (saved) {
          var theme = JSON.parse(saved);
          var root = document.documentElement;
          Object.keys(theme).forEach(function(k) {
            if (theme[k]) root.style.setProperty(k, theme[k]);
          });
        }
      } catch(e) {}
    })();

<body>

<!-- ─── NAVBAR ─────────────────────────────────────────────── -->
<nav class="navbar">

<!-- ─── PAGE ───────────────────────────────────────────────── -->
<main class="page-wrap">

  <!-- Hero Slider -->
  <section class="hero-slider">
    <div id="sliderTrack" class="slider-track"></div>
    <button class="slider-arrow prev" id="sliderPrev">&#8249;</button>
    <button class="slider-arrow next" id="sliderNext">&#8250;</button>
    <div id="sliderDots" class="slider-dots"></div>
  </section>

  <!-- Trending + Leaderboard -->
  <section class="section">
    <div class="section-inner">
      <div class="two-col">

          <div class="section-header">
            <h2 class="section-title">Trending Now</h2>

          <div class="section-header" style="margin-top:48px">

        </div>

        <!-- Sidebar -->

          <div class="sidebar-card">
            <div class="sidebar-title">🏆 Top Players</div>
            <div id="miniLeaderboard"></div>
            <div style="margin-top:16px;text-align:center">
              <a href="leaderboard.html" class="view-all" style="display:inline-flex">Full Leaderboard</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Library Section -->
  <section class="section" style="background:linear-gradient(180deg,var(--bg-card) 0%,transparent 100%); border-top:1px solid var(--border); border-bottom:1px solid var(--border)">

<!-- ─── AUTH MODAL ─────────────────────────────────────────── -->
<div id="authModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-logo">KAIZO CASTLE</div>
      <button class="modal-close" onclick="closeAuthModal()">✕</button>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Register</button>
    </div>
    <!-- Login Form -->
    <form id="loginForm" class="auth-form active" data-form="login">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button class="btn-submit" type="submit" id="loginBtn">Login</button>
      <div class="form-error" id="loginError"></div>
    </form>
    <!-- Register Form -->
    <form id="registerForm" class="auth-form" data-form="register">
      <div class="form-group">
        <label class="form-label" for="regUsername">Username</label>
        <input class="form-input" type="text" id="regUsername" placeholder="CoolPlayer99" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">Email</label>
        <input class="form-input" type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="regPassword">Password</label>
        <input class="form-input" type="password" id="regPassword" placeholder="Min 6 characters" required>
      </div>
      <button class="btn-submit" type="submit" id="registerBtn">Daftar</button>
      <div class="form-error" id="registerError"></div>
    </form>
  </div>
</div>

<!-- ─── SCRIPTS ────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>

<script>
// Load logo from Supabase storage if available
async function loadLogo() {
  const { data } = await supabase.storage.from('logos').list();
  if (data && data.length > 0) {
    const url = getPublicUrl('logos', data[0].name);
    const wrap = document.getElementById('logoWrap');
    wrap.innerHTML = `<img src="${url}" alt="Kaizo Castle" style="height:36px;filter:drop-shadow(0 0 8px #00d4ff)">`;
  }
}
loadLogo();
</script>
