<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kaizo Castle — Gaming Portal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⬡</text></svg>">
</head>
<body>
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-placeholder" id="logoWrap">KAIZO CASTLE</div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link active">Home</a>
      <a href="games.html" class="nav-link ">Games</a>
      <a href="library.html" class="nav-link ">Library</a>
      <a href="leaderboard.html" class="nav-link ">Leaderboard</a>
    </div>
    <div class="nav-actions">
      <div class="search-wrap">
        <button class="nav-btn" onclick="toggleSearch()" title="Search">🔍</button>
        <div id="searchBar">
          <input type="text" id="searchInput" placeholder="Search games...">
          <div id="searchResults"></div>
        </div>
      </div>
      <button class="nav-btn dev-btn" id="devIcon" style="display:none" title="Dev Panel">⚙️</button>
      <button class="nav-btn" id="profileBtn" title="Profile">👤</button>
    </div>
  </div>
</nav>
<main class="page-wrap">

  <section class="hero-slider">
    <div id="sliderTrack" class="slider-track"></div>
    <button class="slider-arrow prev" id="sliderPrev">&#8249;</button>
    <button class="slider-arrow next" id="sliderNext">&#8250;</button>
    <div id="sliderDots" class="slider-dots"></div>
  </section>
  <section class="section">
    <div class="section-inner">
      <div class="two-col">
        <div>
          <div class="section-header">
            <h2 class="section-title">Trending Now</h2>
            <a href="games.html" class="view-all">View All</a>
          </div>
          <div id="trendingGames" class="games-grid"></div>
          <div class="section-header" style="margin-top:48px">
            <h2 class="section-title">Popular Games</h2>
            <a href="games.html" class="view-all">View All</a>
          </div>
          <div id="popularGames" class="games-grid"></div>
        </div>
        <div>
          <div class="sidebar-card">
            <div class="sidebar-title">🏆 Top Players</div>
            <div id="miniLeaderboard"></div>
            <div style="margin-top:16px;text-align:center">
              <a href="leaderboard.html" class="view-all" style="display:inline-flex">Full Leaderboard</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <section class="section" style="background:linear-gradient(180deg,var(--bg-card) 0%,transparent 100%);border-top:1px solid var(--border);border-bottom:1px solid var(--border)">
    <div class="section-inner">
      <div class="section-header">
        <h2 class="section-title">📚 Library</h2>
        <a href="library.html" class="view-all">View All</a>
      </div>
      <div id="libraryBooks" class="books-grid"></div>
    </div>
  </section>
</main>
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">KAIZO CASTLE</div>
    <p class="footer-text">© 2025 Kaizo Castle. All rights reserved.</p>
    <div class="footer-links">
      <a href="games.html">Games</a>
      <a href="library.html">Library</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </div>
</footer>

<!-- AUTH MODAL -->
<div id="authModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-logo">KAIZO CASTLE</div>
      <button class="modal-close" onclick="closeAuthModal()">✕</button>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Register</button>
    </div>
    <form id="loginForm" class="auth-form active" data-form="login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button class="btn-submit" type="submit" id="loginBtn">Login</button>
      <div class="form-error" id="loginError"></div>
    </form>
    <form id="registerForm" class="auth-form" data-form="register">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="regUsername" placeholder="CoolPlayer99" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="regPassword" placeholder="Min 6 karakter" required>
      </div>
      <button class="btn-submit" type="submit" id="registerBtn">Daftar</button>
      <div class="form-error" id="registerError"></div>
    </form>
  </div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    // Fallback CDN kalau jsdelivr gagal
    if (!window.supabase || !window.supabase.createClient) {
      document.write('<scr'+'ipt src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></scr'+'ipt>');
    }
  </script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    // Load logo dari Supabase storage
    (async function() {
      try {
        await _waitClient();
        const { data } = await supabase.storage.from('logos').list('', { limit: 1 });
        if (data && data.length > 0) {
          const url = getPublicUrl('logos', data[0].name);
          const wrap = document.getElementById('logoWrap');
          if (wrap) wrap.innerHTML = '<img src="' + url + '" alt="Logo" style="height:36px;filter:drop-shadow(0 0 8px #00d4ff)">';
        }
      } catch(e) {}
    })();
  </script>
</body>
</html>
