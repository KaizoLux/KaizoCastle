<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard — Kaizo Castle</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-placeholder" id="logoWrap">KAIZO CASTLE</div>
    </a>
    <div class="nav-links">
      <a href="index.html" class="nav-link">Home</a>
      <a href="games.html" class="nav-link">Games</a>
      <a href="library.html" class="nav-link">Library</a>
      <a href="leaderboard.html" class="nav-link active">Leaderboard</a>
    </div>
    <div class="nav-actions">
      <div class="search-wrap">
        <button class="nav-btn" onclick="toggleSearch()" title="Search">🔍</button>
        <div id="searchBar">
          <input type="text" id="searchInput" placeholder="Search games...">
          <div id="searchResults"></div>
        </div>
      </div>
      <button class="nav-btn dev-btn" id="devIcon" style="display:none;" title="Dev Panel">⚙️</button>
      <button class="nav-btn" id="profileBtn" title="Profile">👤</button>
    </div>
  </div>
</nav>

<main class="page-wrap">
  <section class="section">
    <div class="section-inner" style="max-width:800px">

      <div class="page-header">
        <h1 class="page-title">🏆 <span class="page-title-accent">Leaderboard</span></h1>
        <p style="color:var(--text-dim);margin-top:8px;font-size:15px;">Top players ranked by XP</p>
      </div>

      <!-- Top 3 Podium -->
      <div id="podium" style="display:flex;justify-content:center;gap:16px;margin-bottom:40px;flex-wrap:wrap"></div>

      <!-- Full List -->
      <div id="leaderboardList"></div>

    </div>
  </section>
</main>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">KAIZO CASTLE</div>
    <p class="footer-text">© 2025 Kaizo Castle. All rights reserved.</p>
    <div class="footer-links">
      <a href="games.html">Games</a>
      <a href="library.html">Library</a>
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </div>
</footer>

<div id="authModal" class="modal-overlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-logo">KAIZO CASTLE</div>
      <button class="modal-close" onclick="closeAuthModal()">✕</button>
    </div>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login" onclick="switchAuthTab('login')">Login</button>
      <button class="auth-tab" data-tab="register" onclick="switchAuthTab('register')">Register</button>
    </div>
    <form id="loginForm" class="auth-form active" data-form="login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="loginEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" required>
      </div>
      <button class="btn-submit" type="submit" id="loginBtn">Login</button>
      <div class="form-error" id="loginError"></div>
    </form>
    <form id="registerForm" class="auth-form" data-form="register">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" id="regUsername" placeholder="CoolPlayer99" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="regEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="regPassword" placeholder="Min 6 characters" required>
      </div>
      <button class="btn-submit" type="submit" id="registerBtn">Daftar</button>
      <div class="form-error" id="registerError"></div>
    </form>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
async function loadLogo() {
  const { data } = await supabase.storage.from('logos').list();
  if (data && data.length > 0) {
    const url = getPublicUrl('logos', data[0].name);
    document.getElementById('logoWrap').innerHTML = `<img src="${url}" alt="Kaizo Castle" style="height:36px;filter:drop-shadow(0 0 8px #00d4ff)">`;
  }
}
loadLogo();

// Podium for top 3
async function loadPodium() {
  const { data: users } = await supabase
    .from('users').select('username,xp,level')
    .order('xp', { ascending: false }).limit(3);
  if (!users || users.length === 0) return;

  const podium = document.getElementById('podium');
  const medals = ['🥇','🥈','🥉'];
  const sizes = ['90px','70px','70px'];
  const order = [1,0,2]; // 2nd, 1st, 3rd visual order

  const displayed = order.map(i => users[i]).filter(Boolean);
  podium.innerHTML = displayed.map((u, di) => {
    const realIdx = order[di];
    return `
      <div style="text-align:center;animation:fadeIn 0.5s ease ${di*0.1}s both">
        <div style="font-size:${sizes[realIdx]};line-height:1">${medals[realIdx]}</div>
        <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--cyan),var(--red));
          display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;
          margin:12px auto 8px;border:2px solid ${realIdx===0?'var(--gold)':'var(--border)'}">
          ${u.username.charAt(0).toUpperCase()}
        </div>
        <div style="font-weight:700;font-size:14px">${u.username}</div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--gold);margin-top:4px">${u.xp} XP</div>
      </div>
    `;
  }).join('');
}
loadPodium();

// Add keyframe
const style = document.createElement('style');
style.textContent = '@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}';
document.head.appendChild(style);
</script>
</body>
</html>
